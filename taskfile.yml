version: '3'

vars:
  SAIL: ./vendor/bin/sail

tasks:
  install-deps:
    desc: "Installs composer deps (via a one-shot docker container so you don't need PHP locally), creates .env, generates APP_KEY, and installs go-task + pre-commit."
    cmds:
      - |
        docker run --rm \
          -u "$(id -u):$(id -g)" \
          -v "$(pwd):/var/www/html" \
          -w /var/www/html \
          laravelsail/php83-composer:latest \
          composer install --ignore-platform-reqs --no-interaction --prefer-dist
      - cp -n .env.example .env || true
      - |
        if ! grep -q '^APP_KEY=base64:' .env; then
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$(pwd):/var/www/html" \
            -w /var/www/html \
            laravelsail/php83-composer:latest \
            php artisan key:generate --force
        fi
      - brew install go-task || true
      - brew install pre-commit || true
      - pre-commit install || true

  build:
    desc: "Build the Sail app image."
    cmds:
      - '{{.SAIL}} build'

  up:
    desc: "Ups the local compose stack."
    cmds:
      - '{{.SAIL}} up {{.CLI_ARGS}}'

  down:
    desc: "Downs the local compose stack."
    cmds:
      - '{{.SAIL}} down'

  stop:
    desc: "Stops the local compose stack."
    cmds:
      - '{{.SAIL}} stop'

  logs:
    cmds:
      - '{{.SAIL}} logs -f {{.CLI_ARGS}}'

  bash:
    cmds:
      - '{{.SAIL}} shell'

  artisan:
    desc: "Run an artisan command. Usage: task artisan -- migrate"
    cmds:
      - '{{.SAIL}} artisan {{.CLI_ARGS}}'

  manage:
    desc: "Alias for artisan, to mirror Django taskfile UX."
    cmds:
      - '{{.SAIL}} artisan {{.CLI_ARGS}}'

  migrate:
    cmds:
      - '{{.SAIL}} artisan migrate'

  reset-db:
    desc: "Wipes all tables and re-migrates."
    cmds:
      - '{{.SAIL}} artisan migrate:fresh --force'

  create_anemometers:
    desc: >
      Create a batch of random anemometers bundled with readings.
      Usage: task create_anemometers -- num_anemometers num_readings_per_anemometer num_tags_per_reading
    cmds:
      - '{{.SAIL}} artisan w4l:create-anemometers {{.CLI_ARGS}}'

  init-data:
    desc: "Resets DB, loads initial user, seeds 50 anemometers × 100 readings × 2 tags."
    cmds:
      - task: reset-db
      - '{{.SAIL}} artisan db:seed --class=InitialUserSeeder --force'
      - task: create_anemometers
        vars:
          CLI_ARGS: "50 100 2"

  init-app:
    desc: "Idempotent task building and starting the app from scratch."
    cmds:
      - task: build
      - task: up
        vars:
          CLI_ARGS: "-d --wait"
      - task: init-data

  tests:
    cmds:
      - '{{.SAIL}} artisan test {{.CLI_ARGS}}'

  pest:
    cmds:
      - '{{.SAIL}} pest {{.CLI_ARGS}}'

  pint:
    cmds:
      - '{{.SAIL}} pint'
